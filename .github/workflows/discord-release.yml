name: Discord Release Notification

on:
  release:
    types: [published]

jobs:
  notify:
    runs-on: ubuntu-latest
    steps:
      - name: Post to Discord
        env:
          DISCORD_WEBHOOK: ${{ secrets.DISCORD_WEBHOOK_URL }}
        run: |
          # Truncate body to 4000 chars (Discord embed limit is 4096)
          BODY=$(echo '${{ toJSON(github.event.release.body) }}' | head -c 4000)

          # Pick color based on prerelease
          if [ "${{ github.event.release.prerelease }}" = "true" ]; then
            COLOR=16776960  # yellow
          else
            COLOR=7506394   # green
          fi

          cat <<PAYLOAD > /tmp/discord.json
          {
            "embeds": [{
              "title": "${{ github.event.release.name || github.event.release.tag_name }}",
              "url": "${{ github.event.release.html_url }}",
              "color": ${COLOR},
              "description": ${BODY},
              "footer": {
                "text": "NeoApex • ${{ github.event.release.tag_name }}"
              },
              "timestamp": "${{ github.event.release.published_at }}"
            }]
          }
          PAYLOAD

          curl -f -H "Content-Type: application/json" \
            -d @/tmp/discord.json \
            "$DISCORD_WEBHOOK"
