                            </div>
                            <div class="col-md-3">
                                <label class="form-label small fw-medium">最后跟进时间</label>
                                <input class="form-control" type="date"/>
                            </div>
                        </div>

                            <button class="btn btn-primary-custom btn-sm d-flex align-items-center gap-2">
                                <span class="iconify" data-icon="mdi:magnify" style="font-size: 18px;"></span>
                                搜索
                            </button>
                        </div>
                    </div>
                </div>
            </div>

            <div class="col-12">

    // 分页配置
    const itemsPerPage = 5;
    const totalItems = fakeLeadData.length;
    const totalPages = Math.ceil(totalItems / itemsPerPage);
    let currentPage = 1;

    // 状态颜色映射 - Bootstrap badges
    const statusColors = {
        '已联系': 'badge bg-primary',
        '有意向': 'badge bg-success',
        '待联系': 'badge bg-warning text-dark',
        '已报名': 'badge bg-info text-dark',
        '无效线索': 'badge bg-secondary'
    };

    // 渲染表格行
    function renderTableRows(page) {
        const tbody = document.getElementById('lead-table-body');
        const start = (page - 1) * itemsPerPage;
        const end = start + itemsPerPage;
        const pageData = fakeLeadData.slice(start, end);

        tbody.innerHTML = pageData.map(item => `
            <tr>
                <td><input type="checkbox" class="form-check-input"/></td>
                <td>${item.name}</td>
                <td>${item.gender}</td>
                <td>${item.phone}</td>
                <td>${item.grade}</td>
                <td>${item.source}</td>
                <td><span class="${statusColors[item.status] || 'badge bg-secondary'}">${item.status}</span></td>
                <td>${item.age}</td>
                <td>${item.course}</td>
                <td>${item.level}</td>
                <td>${item.createDate}</td>
                <td>${item.creator}</td>
                <td>${item.follower}</td>
                <td>${item.lastFollowDate}</td>
                <td>${item.followContent}</td>
                <td>
                    <button class="btn btn-link btn-sm text-primary p-0 me-2">编辑</button>
                    <button class="btn btn-link btn-sm text-danger p-0">删除</button>
                </td>
            </tr>
        `).join('');
    }

    // 渲染分页按钮
    function renderPaginationButtons() {
        const pageButtons = document.getElementById('page-buttons');
        let buttonsHTML = '';

        if (totalPages <= 7) {
            // 如果总页数小于等于7，显示所有页码
            for (let i = 1; i <= totalPages; i++) {
                buttonsHTML += `<button class="btn btn-sm ${i === currentPage ? 'btn-primary-custom' : 'btn-outline-secondary'}" data-page="${i}">${i}</button>`;
            }
        } else {
            // 显示第一页
            buttonsHTML += `<button class="btn btn-sm ${currentPage === 1 ? 'btn-primary-custom' : 'btn-outline-secondary'}" data-page="1">1</button>`;

            if (currentPage > 3) {
                buttonsHTML += '<span class="px-2 align-self-center">...</span>';
            }

            // 显示当前页前后的页码
            const start = Math.max(2, currentPage - 1);
            const end = Math.min(totalPages - 1, currentPage + 1);

            for (let i = start; i <= end; i++) {
                if (i !== 1 && i !== totalPages) {
                    buttonsHTML += `<button class="btn btn-sm ${i === currentPage ? 'btn-primary-custom' : 'btn-outline-secondary'}" data-page="${i}">${i}</button>`;
                }
            }

            if (currentPage < totalPages - 2) {
                buttonsHTML += '<span class="px-2 align-self-center">...</span>';
            }

            // 显示最后一页
            buttonsHTML += `<button class="btn btn-sm ${currentPage === totalPages ? 'btn-primary-custom' : 'btn-outline-secondary'}" data-page="${totalPages}">${totalPages}</button>`;
        }

        pageButtons.innerHTML = buttonsHTML;

        // 添加页码按钮点击事件
        pageButtons.querySelectorAll('button[data-page]').forEach(btn => {
            btn.addEventListener('click', function() {
                goToPage(parseInt(this.dataset.page));
            });
        });
    }

    // 更新分页信息
    function updatePaginationInfo() {
        const start = (currentPage - 1) * itemsPerPage + 1;
        const end = Math.min(currentPage * itemsPerPage, totalItems);
        const infoElement = document.getElementById('pagination-info');
        infoElement.textContent = `显示第 ${start} 到 ${end} 条，共 ${totalItems} 条记录`;
    }

    // 更新分页按钮状态
    function updatePaginationButtons() {
        const prevBtn = document.getElementById('prev-page-btn');
        const nextBtn = document.getElementById('next-page-btn');

        prevBtn.disabled = currentPage === 1;
        nextBtn.disabled = currentPage === totalPages;

        // Bootstrap buttons handle disabled state automatically via disabled attribute
    }

    // 跳转到指定页面
    function goToPage(page) {
        if (page < 1 || page > totalPages) return;
        currentPage = page;
        renderTableRows(currentPage);
        renderPaginationButtons();
        updatePaginationInfo();
        updatePaginationButtons();
    }

    // 初始化导航栏
    document.addEventListener('DOMContentLoaded', async function() {
        if (!document.querySelector('.navbar')) {
            await initNavbar({}, 'body');
        }
        
        // 初始化底部栏
        initFooter({}, 'body');

        // 初始化分页
        renderTableRows(currentPage);
        renderPaginationButtons();
        updatePaginationInfo();
        updatePaginationButtons();

        // 上一页按钮
        document.getElementById('prev-page-btn').addEventListener('click', function() {
            if (currentPage > 1) {
                goToPage(currentPage - 1);
            }
        });

        // 下一页按钮
        document.getElementById('next-page-btn').addEventListener('click', function() {
            if (currentPage < totalPages) {
                goToPage(currentPage + 1);
            }
        });
    });
</script>
