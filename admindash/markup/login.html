<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="utf-8"/>
    <meta content="width=device-width, initial-scale=1.0" name="viewport"/>
    <title>用户登录注册</title>
    <!-- Bootstrap 5 CSS -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet" integrity="sha384-T3c6CoIi6uLrA9TneNEoa7RxnatzjcDSCmG1MXxSR1GAsXEV/Dwwykc2MPK8M2HN" crossorigin="anonymous">
    <!-- Bootstrap Icons -->
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.1/font/bootstrap-icons.css">
    <!-- Iconify for additional icons -->
    <script src="https://code.iconify.design/3/3.1.1/iconify.min.js"></script>
    <!-- Footer CSS -->
    <link rel="stylesheet" href="footer.css">
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap');
        :root {
            --brand-blue: #4a6cf7;
            --brand-gray-100: #f9fafb;
            --brand-gray-200: #e5e7eb;
            --brand-gray-400: #9ca3af;
            --brand-gray-700: #374151;
            --brand-green: #10b981;
        }
        body {
            font-family: 'Inter', sans-serif;
            background-color: var(--brand-gray-100);
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            margin: 0;
        }
        .login-card {
            box-shadow: 0 10px 25px -5px rgba(0, 0, 0, 0.1);
            transition: all 0.3s ease;
            border-radius: 12px;
        }
        .form-control:focus {
            border-color: var(--brand-blue);
            box-shadow: 0 0 0 0.2rem rgba(74, 108, 247, 0.25);
        }
        .btn-brand-primary {
            background-color: var(--brand-blue);
            border-color: var(--brand-blue);
            color: white;
        }
        .btn-brand-primary:hover {
            background-color: #3a5ae0;
            border-color: #3a5ae0;
            color: white;
        }
        .btn-google {
            border-color: var(--brand-gray-200);
            transition: all 0.3s ease;
        }
        .btn-google:hover {
            box-shadow: 0 4px 6px -1px rgba(66, 133, 244, 0.2);
            background-color: #f8fafc;
            border-color: var(--brand-gray-200);
        }
    </style>
</head>
<body>
    <div class="container-fluid d-flex flex-column justify-content-center align-items-center min-vh-100 px-4 py-5">
        <!-- 登录表单卡 -->
        <div class="card login-card border-0" style="max-width: 600px; width: 100%;">
            <div class="card-body p-5">
                <!-- Logo -->
                <div class="text-center mb-4">
                    <img alt="Logo" src="https://www.acmeschool.com/uploads/2/7/1/4/27147223/1418317113.png" style="height: 40px;"/>
                </div>
                <!-- 标题 -->
                <h1 class="text-center fw-bold mb-5" style="color: var(--brand-gray-700); font-size: 1.75rem;">欢迎回来</h1>
                <div class="row g-4">
                    <!-- 左侧表单区域 -->
                    <div class="col-md-6 pe-md-4 border-md-end border-secondary border-opacity-25">
                        <form>
                            <div class="mb-4">
                                <label class="form-label fw-medium mb-2" for="username" style="color: var(--brand-gray-700); font-size: 0.875rem;">
                                    用户名
                                </label>
                                <input class="form-control form-control-lg" id="username" placeholder="请输入用户名" type="text" required/>
                            </div>
                            <div class="mb-4">
                                <label class="form-label fw-medium mb-2" for="password" style="color: var(--brand-gray-700); font-size: 0.875rem;">
                                    密码
                                </label>
                                <input class="form-control form-control-lg" id="password" placeholder="请输入密码" type="password" required/>
                            </div>
                            <button class="btn btn-brand-primary w-100 py-3 fw-semibold" type="submit">
                                登录
                            </button>
                        </form>
                    </div>
                    <!-- 右侧登录方式 -->
                    <div class="col-md-6 ps-md-4 d-flex flex-column align-items-center justify-content-center">
                        <div class="text-muted small mb-4">其他登录方式</div>
                        <button type="button" class="btn btn-google w-100 d-flex align-items-center justify-content-center gap-2 py-3" id="google-login-btn">
                            <span class="iconify" data-icon="flat-color-icons:google" style="font-size: 24px;"></span>
                            <span class="fw-medium" style="color: var(--brand-gray-700);">使用 Google 登录</span>
                        </button>
                    </div>
                </div>
            </div>
            <!-- 底部注册链接 -->
            <div class="card-footer bg-light border-top text-center py-3">
                <p class="text-muted small mb-0">
                    还没有账号？ 
                    <a class="fw-medium text-decoration-none" href="#" style="color: var(--brand-green);">立即注册</a>
                </p>
            </div>
        </div>
    </div>
    <!-- Footer JS -->
    <script src="i18n.js"></script>
    <script src="footer.js"></script>
    <!-- Bootstrap 5 JS Bundle (includes Popper) -->
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/js/bootstrap.bundle.min.js" integrity="sha384-C6RzsynM9kWDrMNeT87bh95OGNyZPhcTNXj1NW7RuBCsyN/o0jlpcV8Qyq46cDfL" crossorigin="anonymous"></script>
    <script>
        // 登录表单提交处理
        document.addEventListener('DOMContentLoaded', function() {
            const loginForm = document.querySelector('form');
            const googleLoginBtn = document.getElementById('google-login-btn');
            
            // 处理表单提交
            if (loginForm) {
                loginForm.addEventListener('submit', function(e) {
                    e.preventDefault(); // 阻止默认表单提交
                    
                    // 获取用户名和密码（这里可以添加验证逻辑）
                    const username = document.getElementById('username').value;
                    const password = document.getElementById('password').value;
                    
                    // 简单的验证（可选）
                    if (!username || !password) {
                        alert('请输入用户名和密码');
                        return;
                    }
                    
                    // 重定向到首页
                    window.location.href = 'homepage.html';
                });
            }
            
            // 处理Google登录按钮点击
            if (googleLoginBtn) {
                googleLoginBtn.addEventListener('click', function() {
                    // 重定向到首页（实际应用中这里应该调用Google登录API）
                    window.location.href = 'homepage.html';
                });
            }
            
            // 初始化底部栏
            initFooter({}, 'body');
        });
    </script>
</body>
</html>
